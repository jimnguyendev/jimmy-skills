name: Lint

on:
  push:
    branches: [master]
    paths:
      - "packs/**"
      - "README.md"
      - "CLAUDE.md"
      - ".claude-plugin/**"
      - ".github/**"
  pull_request:
    paths:
      - "packs/**"
      - "README.md"
      - "CLAUDE.md"
      - ".claude-plugin/**"
      - ".github/**"
  workflow_dispatch: {}

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: markdownlint-cli2-action
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: ".markdownlint-cli2.jsonc"
          globs: "**/*.md"
